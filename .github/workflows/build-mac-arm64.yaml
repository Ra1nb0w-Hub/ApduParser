name: Build macOS Apple Silicon App

on:
  workflow_dispatch:

jobs:
  build-mac-arm64:
    runs-on: macos-14

    defaults:
      run:
        working-directory: ./

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build macOS Apple Silicon app
        run: npm run dist:mac:arm64

      - name: Zip .app
        run: |
          APP_PATH=$(find release -maxdepth 2 -name "ApduParser.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "ApduParser.app not found"
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" release/ApduParser-macOS-arm64-app.zip

      - name: Upload macOS Apple Silicon artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ApduParser-macOS-arm64
          path: |
            ./release/*arm64*.dmg
            ./release/ApduParser-macOS-arm64-app.zip
