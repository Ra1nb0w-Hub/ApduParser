name: Build macOS App

on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    defaults:
      run:
        working-directory: ./

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build macOS app
        run: npm run dist:mac

      - name: Zip .app
        run: |
          cd release/mac
          ditto -c -k --sequesterRsrc --keepParent ApduParser.app ../ApduParser-macOS-app.zip

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ApduParser-macOS
          path: |
            ./release/*.dmg
            ./release/ApduParser-macOS-app.zip